services:
  db:
    image: postgres:16-alpine
    container_name: sui_postgres_db
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydatabase
    
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data 

